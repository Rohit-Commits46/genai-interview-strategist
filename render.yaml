services:
  - type: web
    name: genai-interview-strategist-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install && npm run build
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_GENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
